name: deploy editor to Pages

# Builds the static editor (apps/editor -> dist/) and publishes it to GitHub
# Pages. The editor is base-path-aware (document.baseURI), so it works under the
# project subpath (/<repo>/). No COOP/COEP needed (esbuild-wasm, not WebContainers).

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - uses: actions/configure-pages@v5
      - name: Build editor (postinstall: typings + templates + asset links)
        working-directory: apps/editor
        run: npm install --no-audit --no-fund
      - name: Assemble static dist
        working-directory: apps/editor
        run: npm run build-dist
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/editor/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: "${{ steps.deployment.outputs.page_url }}"
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
