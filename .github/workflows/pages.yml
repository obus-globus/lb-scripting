name: Deploy editor to Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Install (postinstall builds typings + templates + asset links)
        working-directory: apps/editor
        run: npm install --no-audit --no-fund
      - name: Assemble static dist
        working-directory: apps/editor
        run: npm run build-dist
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/editor/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
