name: build

# Builds both halves self-contained:
#  - the in-game LiquidBounce script (host/ → dist/main.mjs)
#  - the editor (app/ → dist/), whose template sources are vendored in
#    app/vendor/templates, plus the headless verify suite.

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  build-host:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/host
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: npm install --no-audit --no-fund
      - run: npm run typecheck
      - run: npm run build
      - run: ls -l dist
      - uses: actions/upload-artifact@v4
        with:
          name: lb-ide-host
          path: apps/host/dist/main.mjs
          if-no-files-found: error
      - name: Attach to release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: apps/host/dist/main.mjs

  build-editor:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/editor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - name: Ensure a browser for the headless suite
        uses: browser-actions/setup-chrome@v1
        id: chrome
      - name: Install (postinstall builds typings + templates + asset links)
        run: npm install --no-audit --no-fund
      - name: Verify (headless)
        run: npm run verify
        env:
          PUPPETEER_EXECUTABLE_PATH: ${{ steps.chrome.outputs.chrome-path }}
      - name: Build static dist
        run: npm run build-dist
      - uses: actions/upload-artifact@v4
        with:
          name: lb-ide-editor
          path: apps/editor/dist
          if-no-files-found: error
