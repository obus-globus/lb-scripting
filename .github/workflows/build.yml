name: build host script

# Type-checks and builds the in-game LiquidBounce script (host/ → dist/main.mjs)
# and uploads it as an artifact. On a version tag it also attaches the .mjs to a
# GitHub Release. (The editor in app/ isn't built in CI — it pulls template
# sources from sibling repos that don't live in this repo.)

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  build-host:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: host
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Show output
        run: ls -l dist && head -1 dist/main.mjs

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lb-ide-host
          path: host/dist/main.mjs
          if-no-files-found: error

      - name: Attach to release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: host/dist/main.mjs
