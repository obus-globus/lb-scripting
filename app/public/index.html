<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LB Script IDE</title>
  <style>
    :root { --bg:#1e1e1e; --bg2:#252526; --bg3:#2d2d2d; --fg:#d4d4d4; --acc:#0e639c; --acc2:#1177bb; --err:#f48771; --ok:#89d185; }
    * { box-sizing: border-box; }
    html, body { margin:0; height:100%; font-family: ui-monospace, "SF Mono", Menlo, monospace; background:var(--bg); color:var(--fg); }
    /* in-game translucency (?opacity=NN) — show the game crisply behind the IDE */
    html.translucent, html.translucent body, html.translucent #editor { background:transparent !important; }
    html.translucent #bar, html.translucent #tabs, html.translucent #ftabs, html.translucent #log,
    html.translucent #side, html.translucent #sideHead { background-color: rgba(30,30,33, var(--a, .85)) !important; }
    html.translucent .monaco-editor, html.translucent .monaco-editor-background,
    html.translucent .monaco-editor .margin { background:transparent !important; }
    #app { display:grid; grid-template-rows:auto auto auto 1fr auto; height:100%; }
    #bar { display:flex; align-items:center; gap:8px; padding:6px 10px; background:var(--bg2); border-bottom:1px solid #111; font-size:13px; }
    #bar .spacer { flex:1; }
    #bar button { font:inherit; background:var(--acc); color:#fff; border:0; border-radius:4px; padding:5px 10px; cursor:pointer; }
    #bar button:hover { background:var(--acc2); }
    #bar button.ghost { background:#3a3a3a; }
    #bar button.ghost:hover { background:#484848; }
    #bar button:disabled { opacity:.5; cursor:default; }
    /* project tab bar */
    #tabs { display:flex; align-items:stretch; gap:2px; background:#1b1b1b; border-bottom:1px solid #111; padding:0 6px; overflow-x:auto; min-height:34px; }
    .ptab { display:flex; align-items:center; gap:8px; padding:6px 10px; font-size:12px; cursor:pointer; color:#aaa; border-top:2px solid transparent; white-space:nowrap; }
    .ptab:hover { background:var(--bg3); }
    .ptab.active { background:var(--bg); color:#fff; border-top-color:var(--acc2); }
    .ptab .x { opacity:.45; } .ptab .x:hover { opacity:1; color:var(--err); }
    .ptab .tmpl { font-size:10px; color:#6a6; }
    /* file tab bar (open editors in the current project) */
    #ftabs { display:flex; align-items:stretch; gap:1px; background:#161616; border-bottom:1px solid #111; padding:0 6px; overflow-x:auto; min-height:30px; }
    #ftabs:empty { display:none; }
    .ftab { display:flex; align-items:center; gap:8px; padding:4px 9px; font-size:12px; cursor:pointer; color:#9a9a9a; border-right:1px solid #111; white-space:nowrap; }
    .ftab:hover { background:var(--bg3); color:#ccc; }
    .ftab.active { background:var(--bg); color:#fff; }
    .ftab .dir { color:#666; }
    .ftab .x { opacity:.4; } .ftab:hover .x { opacity:.7; } .ftab .x:hover { opacity:1; color:var(--err); }
    #newProj { align-self:center; margin-left:4px; background:#3a3a3a; color:#fff; border:0; border-radius:4px; padding:4px 9px; font:inherit; font-size:13px; cursor:pointer; }
    #newProj:hover { background:#484848; }
    /* template menu */
    #tmplMenu { position:fixed; z-index:50; background:var(--bg2); border:1px solid #111; border-radius:6px; box-shadow:0 6px 24px #000a; padding:4px; display:none; min-width:280px; }
    #tmplMenu .item { padding:7px 10px; border-radius:4px; cursor:pointer; }
    #tmplMenu .item:hover { background:var(--acc); }
    #tmplMenu .item b { font-size:13px; } #tmplMenu .item span { display:block; font-size:11px; color:#9a9a9a; }
    #tmplMenu .item:hover span { color:#dde; }
    #tmplMenu .sep { height:1px; background:#ffffff18; margin:4px 6px; }
    #mid { display:grid; grid-template-columns:200px 1fr; min-height:0; }
    #side { background:#252526; border-right:1px solid #111; overflow:auto; font-size:13px; }
    #side::-webkit-scrollbar { width:10px; } #side::-webkit-scrollbar-thumb { background:#424242; }
    #sideHead { display:flex; align-items:center; justify-content:space-between; gap:6px; padding:8px 8px 6px 12px; font-size:11px; text-transform:uppercase; letter-spacing:.6px; color:#bbb; position:sticky; top:0; background:#252526; z-index:2; }
    #sideHead .sideActs { display:flex; gap:1px; }
    #sideHead button { font:inherit; background:transparent; color:#c5c5c5; border:0; border-radius:5px; width:22px; height:22px; padding:0; cursor:pointer; display:flex; align-items:center; justify-content:center; }
    #sideHead button:hover { background:#ffffff1a; }
    #sideHead button svg { width:16px; height:16px; }
    #sideHead button.on { background:#0e639c; color:#fff; }
    #sideHead button.on:hover { background:#1177bb; }
    /* VS Code-style tree rows */
    .tv-row { display:flex; align-items:center; height:22px; padding-right:6px; cursor:pointer; color:#cccccc; white-space:nowrap; user-select:none; }
    .tv-row:hover { background:#2a2d2e; }
    .tv-row.active { background:#094771; }
    #side:focus-within .tv-row.active { background:#094771; }
    .tv-row .ig { width:8px; align-self:stretch; flex:none; box-shadow: inset 1px 0 0 #ffffff12; }
    .tv-row .tw { width:16px; height:22px; flex:none; display:flex; align-items:center; justify-content:center; color:#c5c5c5; }
    .tv-row .tw svg { width:16px; height:16px; transition:transform .08s ease; }
    .tv-row .tw.closed svg { transform:rotate(-90deg); }
    .tv-row .ic { width:16px; height:16px; flex:none; margin-right:5px; display:flex; align-items:center; justify-content:center; }
    .tv-row .ic svg { width:16px; height:16px; }
    .tv-row .nm { overflow:hidden; text-overflow:ellipsis; }
    .tv-row.dim .nm { opacity:.55; }
    .tv-row.dim .ic { opacity:.6; }
    .tv-row.root .nm { text-transform:uppercase; font-size:11px; letter-spacing:.5px; color:#bbb; font-weight:600; }
    .tv-row .acts { margin-left:auto; display:flex; gap:1px; opacity:0; padding-left:6px; }
    .tv-row:hover .acts { opacity:1; }
    .tv-row .acts .b { width:20px; height:20px; display:flex; align-items:center; justify-content:center; color:#c5c5c5; border-radius:5px; }
    .tv-row .acts .b:hover { background:#ffffff1f; }
    .tv-row .acts .b svg { width:15px; height:15px; }
    #editor { min-width:0; }
    #log { height:150px; background:#141414; border-top:1px solid #111; overflow:auto; padding:8px 10px; font-size:12px; white-space:pre-wrap; }
    #log .e { color:var(--err); }
    #log .s { color:var(--ok); }
    #log .d { color:#888; }
    #status { font-size:12px; color:#888; }
  </style>
</head>
<body>
  <div id="app">
    <div id="bar">
      <strong>LB Script IDE</strong>
      <span class="spacer"></span>
      <span id="status">booting…</span>
      <button id="rename" class="ghost">rename</button>
      <button id="build">build</button>
      <button id="runClient" style="display:none; background:#2d7d33">build &amp; run in client</button>
      <button id="download" class="ghost" disabled>download .mjs</button>
    </div>
    <div id="tabs"></div>
    <div id="ftabs"></div>
    <div id="mid">
      <div id="side">
        <div id="sideHead">
          <span>Explorer</span>
          <span class="sideActs">
            <button id="addFile" title="New File">
              <svg viewBox="0 0 16 16"><path fill="currentColor" d="M9.5 1.1l3.4 3.4.1.4v9.6l-.5.5h-9l-.5-.5v-13l.5-.5h5.1l.4.1zM9 2H4v12h8V5H9.5L9 4.5V2zm1 0v2h2l-2-2zM8 7H7v2H5v1h2v2h1v-2h2V9H8V7z"/></svg>
            </button>
            <button id="addFolder" title="New Folder">
              <svg viewBox="0 0 16 16"><path fill="currentColor" d="M14.5 4H8.7L7.5 2.6 7.1 2.5H1.5l-.5.5v10l.5.5h13l.5-.5V4.5l-.5-.5zM14 13H2V3.5h4.8l1.2 1.4.4.1H14V13zm-3.5-5H9V6.5H8V8H6.5v1H8v1.5h1V9h1.5V8z"/></svg>
            </button>
            <button id="toggleAux" title="Show supporting files (build script, lib, configs)">
              <svg viewBox="0 0 16 16"><path fill="currentColor" d="M8 3C4.5 3 1.7 5.1.5 8c1.2 2.9 4 5 7.5 5s6.3-2.1 7.5-5C14.3 5.1 11.5 3 8 3zm0 8.3A3.3 3.3 0 1 1 8 4.7a3.3 3.3 0 0 1 0 6.6zM8 6.2a1.8 1.8 0 1 0 0 3.6 1.8 1.8 0 0 0 0-3.6z"/></svg>
            </button>
            <button id="collapseAll" title="Collapse Folders">
              <svg viewBox="0 0 16 16"><path fill="currentColor" d="M9 9H4V8h5v1zm0-3H4V5h5v1zM3 2.5l.5-.5h9l.5.5v3h-1V3H3.5L3 2.5zm10 11l-.5.5h-9l-.5-.5v-3h1V13h9.5l-.5.5zM4 11h5v-1H4v1z"/></svg>
            </button>
          </span>
        </div>
        <div id="files"></div>
      </div>
      <div id="editor"></div>
    </div>
    <div id="log"></div>
  </div>
  <div id="tmplMenu"></div>
  <script src="vs/loader.js"></script>
  <script src="esbuild.js"></script>
  <script src="main.js"></script>
</body>
</html>
